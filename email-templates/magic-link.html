<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Your sign-in link</title>
</head>
<body style="margin:0;padding:0;background:#0f1117;font-family:Segoe UI,system-ui,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#0f1117;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" style="max-width:520px;background:#161a22;border-radius:16px;border:1px solid rgba(255,255,255,0.08);">
          <tr>
            <td style="padding:28px;">
              <p style="margin:0;font-size:13px;letter-spacing:0.12em;text-transform:uppercase;color:#94a3b8;">Augustus OS</p>
              <h1 style="margin:12px 0 0 0;font-size:22px;font-weight:650;color:#f1f5f9;">Sign in to Augustus OS</h1>
              <p style="margin:16px 0 0 0;font-size:15px;line-height:1.55;color:#cbd5e1;">
                Use the link below to open your session. You’ll land in the console when you’re done.
              </p>
              <p style="margin:24px 0 0 0;">
                <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:14px 22px;background:linear-gradient(135deg,#4f46e5,#6366f1);color:#ffffff !important;text-decoration:none;font-weight:600;font-size:15px;border-radius:12px;">
                  Open Augustus OS
                </a>
              </p>
              <p style="margin:20px 0 0 0;font-size:13px;color:#64748b;word-break:break-all;">{{ .ConfirmationURL }}</p>
              <p style="margin:24px 0 0 0;font-size:12px;color:#475569;border-top:1px solid rgba(255,255,255,0.06);padding-top:20px;">
                Egypt · Augustus OS — if you didn’t request this email, ignore it.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
